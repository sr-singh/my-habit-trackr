const DAYS   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function toKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function todayKey() { return toKey(new Date()); }
function offsetDate(key,delta) { const d=new Date(key+"T12:00:00"); d.setDate(d.getDate()+delta); return toKey(d); }
function getDaysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }

function calcStreak(id,data) {
  let s=0, k=todayKey();
  for(let i=0;i<400;i++){
    const v=data[k]?.[id];
    if(v==="Y") s++;
    else if(v==="N") break;
    else if(k<todayKey()) break;
    k=offsetDate(k,-1);
  }
  return s;
}

// ── Sort helpers ───────────────────────────────────────────────
// Today: rest → bool → number(weight last)
function sortToday(habits){
  return [...habits].sort((a,b)=>{
    const rank=h=>h.type==="number"?(h.id==="weight"?4:3):h.restAllowed?0:1;
    return rank(a)-rank(b);
  });
}
// Stats weekly/monthly: weight → other numbers → rest bool → plain bool
function sortStats(habits){
  return [...habits].sort((a,b)=>{
    const rank=h=>{
      if(h.id==="weight") return 0;
      if(h.type==="number") return 1;
      if(h.type==="bool"&&h.restAllowed) return 2;
      return 3;
    };
    return rank(a)-rank(b);
  });
}

function MonthScreen({data,habits}){
  const now=new Date();
  const [yr,setYr]=useState(now.getFullYear());
  const [mo,setMo]=useState(now.getMonth());
  const [sel,setSel]=useState(null);
  const dim=getDaysInMonth(yr,mo); const fDay=new Date(yr,mo,1).getDay(); const ts=todayKey();
  const bh=habits.filter(h=>h.type==="bool");

  function getStatus(d){
    const k=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const e=data[k]; if(!e) return null;
    const vis=bh.filter(h=>!h.createdAt||h.createdAt<=k);
    return{done:vis.filter(h=>e[h.id]==="Y").length,missed:vis.filter(h=>e[h.id]==="N").length,key:k,raw:e};
  }
  const prev=()=>mo===0?(setYr(y=>y-1),setMo(11)):setMo(m=>m-1);
  const next=()=>mo===11?(setYr(y=>y+1),setMo(0)):setMo(m=>m+1);

  return(
    <div style={{paddingBottom:100}}>
      <div style={{padding:"52px 24px 24px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:0}}>
          <IBtn icon="chevL" onClick={prev}/>
          <div style={{textAlign:"center"}}>
            <Lbl style={{display:"block",color:T.textMid}}>{String(yr)}</Lbl>
            <div style={{fontSize:26,fontWeight:300,letterSpacing:-0.5,color:T.text,marginTop:4}}>{MONTHS[mo]}</div>
          </div>
          <IBtn icon="chevR" onClick={next}/>
        </div>
      </div>
      <Hr/>
      <div style={{padding:"20px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:8}}>
          {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:T.textLow,letterSpacing:2,padding:"4px 0",fontWeight:500}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {Array(fDay).fill(null).map((_,i)=><div key={`e${i}`}/>)}
          {Array(dim).fill(null).map((_,i)=>{
            const d=i+1;
            const k=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const st=getStatus(d); const iT=k===ts; const iS=k===sel;
            const dot=st&&(st.done>0||st.missed>0)?(st.missed>0?T.textLow:T.textMid):null;
            return(
              <div key={d} onClick={()=>setSel(iS?null:k)} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,borderRadius:8,cursor:"pointer",background:iS?T.surfaceHi:iT?T.surface:"transparent",border:iT?`1px solid ${T.borderHi}`:"1px solid transparent"}}>
                <span style={{fontSize:13,color:iT?T.text:T.textMid,fontWeight:iT?500:300}}>{d}</span>
                {dot&&<div style={{width:4,height:4,borderRadius:"50%",background:dot}}/>}
              </div>
            );
          })}
        </div>
        {sel&&(()=>{
          const sd=data[sel];
          const visH=sortToday(habits.filter(h=>!h.createdAt||h.createdAt<=sel));
          return(
            <div style={{marginTop:24}}>
              <Hr/>
              <div style={{paddingTop:20}}>
                <Lbl>{new Date(sel+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</Lbl>
                <div style={{marginTop:16}}>
                  {sd?visH.map((h,i)=>{
                    const v=sd[h.id];
                    const dv=h.type==="number"?(v?`${v}`:"—"):(v==="Y"?"Done":v==="N"?"Missed":v==="R"?"Rest":"—");
                    return <div key={h.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0",borderBottom:i<visH.length-1?`1px solid ${T.border}`:"none"}}><span style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:T.textMid,fontWeight:500}}>{h.label}</span><Lbl style={{color:v?T.text:T.textLow}}>{dv}</Lbl></div>;
                  }):<Lbl>No data logged</Lbl>}
                </div>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

function PeriodHabits({habits,data,keys}){
  // sorted: weight → rest → bool → other numbers
  const sorted=sortStats(habits);

  function countB(id){return{done:keys.filter(k=>data[k]?.[id]==="Y").length,missed:keys.filter(k=>data[k]?.[id]==="N").length,rest:keys.filter(k=>data[k]?.[id]==="R").length};}
  function numVals(id){return keys.map(k=>data[k]?.[id]).filter(v=>v!==undefined&&v!=="");}

  return(
    <div style={{marginTop:20}}>
      {sorted.map((h,i)=>{
        const isLast=i===sorted.length-1;
        const border=isLast?"none":`1px solid ${T.border}`;

        if(h.id==="weight"){
          const vals=numVals(h.id);
          const first=vals[0],last=vals[vals.length-1];
          const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
          const change=(first!==undefined&&last!==undefined)?+(last-first).toFixed(1):null;
          return(
            <div key={h.id} style={{padding:"14px 0",borderBottom:border}}>
              <span style={{fontSize:11,fontWeight:500,color:T.text,letterSpacing:3,textTransform:"uppercase"}}>{h.label}</span>
              <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
                <StatNum value={first?first.toFixed(1):"—"} sub="Start"/>
                <StatNum value={last?last.toFixed(1):"—"} sub="End"/>
                <StatNum value={change!==null?`${change>0?"+":""}${change}`:"—"} sub="Change"/>
              </div>
            </div>
          );
        }

        if(h.type==="bool"){
          const {done,missed,rest}=countB(h.id);
          return(
            <div key={h.id} style={{padding:"14px 0",borderBottom:border}}>
              <span style={{fontSize:11,fontWeight:500,color:T.text,letterSpacing:3,textTransform:"uppercase"}}>{h.label}</span>
              <div style={{marginTop:12,display:"grid",gridTemplateColumns:h.restAllowed?"1fr 1fr 1fr":"1fr 1fr",gap:4}}>
                <StatNum value={done} sub="Done"/>
                <StatNum value={missed} sub="Missed"/>
                {h.restAllowed&&<StatNum value={rest} sub="Rest"/>}
              </div>
            </div>
          );
        }

        // other number (sleep etc)
        const vals=numVals(h.id);
        const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
        const min=vals.length?Math.min(...vals).toFixed(1):null;
        const max=vals.length?Math.max(...vals).toFixed(1):null;
        return(
          <div key={h.id} style={{padding:"14px 0",borderBottom:border}}>
            <span style={{fontSize:11,fontWeight:500,color:T.text,letterSpacing:3,textTransform:"uppercase"}}>{h.label}</span>
            <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
              <StatNum value={avg||"—"} sub="Avg"/>
              <StatNum value={min||"—"} sub="Min"/>
              <StatNum value={max||"—"} sub="Max"/>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function StatsScreen({data,habits}){
  const now=new Date();
  const [wY,setWY]=useState(now.getFullYear()); const [wM,setWM]=useState(now.getMonth());
  const [wI,setWI]=useState(Math.floor((now.getDate()-1)/7));
  const [mY,setMY]=useState(now.getFullYear()); const [mM,setMM]=useState(now.getMonth());

  const streakH=habits.filter(h=>h.type==="bool"&&h.streakHabit);
  // non-streak habits for weekly/monthly
  const nonStreakH=habits.filter(h=>!h.streakHabit);

  const wDim=getDaysInMonth(wY,wM); const maxWI=Math.floor((wDim-1)/7);
  const wStart=wI*7+1; const wEnd=Math.min(wStart+6,wDim);

  function prevWeek(){if(wI>0){setWI(i=>i-1);}else{const nm=wM===0?11:wM-1,ny=wM===0?wY-1:wY;setWM(nm);setWY(ny);setWI(Math.floor((getDaysInMonth(ny,nm)-1)/7));}}
  function nextWeek(){if(wI<maxWI){setWI(i=>i+1);}else{const nm=wM===11?0:wM+1,ny=wM===11?wY+1:wY;setWM(nm);setWY(ny);setWI(0);}}
  const prevMo=()=>mM===0?(setMY(y=>y-1),setMM(11)):setMM(m=>m-1);
  const nextMo=()=>mM===11?(setMY(y=>y+1),setMM(0)):setMM(m=>m+1);

  function keys(y,m,s,e){return Array.from({length:e-s+1},(_,i)=>`${y}-${String(m+1).padStart(2,"0")}-${String(s+i).padStart(2,"0")}`);}
  function moKeys(y,m){return keys(y,m,1,getDaysInMonth(y,m));}

  const wKeys=keys(wY,wM,wStart,wEnd);
  const mKeys=moKeys(mY,mM);

  return(
    <div style={{paddingBottom:100}}>
      <div style={{padding:"52px 24px 24px",textAlign:"center"}}>
        <div style={{fontSize:26,fontWeight:300,letterSpacing:-0.5,color:T.text}}>Report</div>
      </div>
      <Hr/>
      <div style={{padding:"28px 24px",display:"flex",flexDirection:"column",gap:40}}>

        {/* STREAKS */}
        {streakH.length>0&&(
          <section>
            <Lbl style={{color:T.textMid,fontWeight:700,letterSpacing:4}}>Streaks</Lbl>
            <div style={{marginTop:20}}>
              {streakH.map((h,i)=>{
                const streak=calcStreak(h.id,data);
                const allK=Object.keys(data);
                const done=allK.filter(k=>data[k]?.[h.id]==="Y").length;
                const missed=allK.filter(k=>data[k]?.[h.id]==="N").length;
                return(
                  <div key={h.id} style={{paddingBottom:i<streakH.length-1?22:0,borderBottom:i<streakH.length-1?`1px solid ${T.border}`:"none",marginBottom:i<streakH.length-1?22:0}}>
                    <span style={{fontSize:11,fontWeight:500,color:T.text,letterSpacing:3,textTransform:"uppercase"}}>{h.label}</span>
                    <div style={{marginTop:14,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
                      <StatNum value={streak} sub="Streak"/>
                      <StatNum value={done} sub="Done"/>
                      <StatNum value={missed} sub="Missed"/>
                    </div>
                  </div>
                );
              })}
            </div>
          </section>
        )}

        {/* WEEKLY */}
        <section>
          <NavRow label="Weekly" onPrev={prevWeek} onNext={nextWeek} info={`${MONTHS[wM].slice(0,3)}  ${wStart}–${wEnd}`}/>
          <PeriodHabits habits={nonStreakH} data={data} keys={wKeys}/>
        </section>

        {/* MONTHLY */}
        <section>
          <NavRow label="Monthly" onPrev={prevMo} onNext={nextMo} info={`${MONTHS[mM].slice(0,3)}  ${mY}`}/>
          <PeriodHabits habits={nonStreakH} data={data} keys={mKeys}/>
        </section>

      </div>
    </div>
  );
}

              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            {loading ? "Signing in..." : "Continue with Google"}
          </button>

          {error && <div style={{marginTop:16,fontSize:11,color:"#888",letterSpacing:1,textAlign:"center"}}>{error}</div>}
        </div>
      );
    }

    // ── User Menu ─────────────────────────────────────────────────
    function ConfirmDialog({ title, description, confirmLabel, confirmStyle, onConfirm, onBack, deleting }) {
      return (
        <div style={{position:"fixed",inset:0,zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 32px"}}>
          <div onClick={onBack} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)"}}/>
          <div style={{position:"relative",background:"#141414",borderRadius:16,border:"1px solid #2A2A2A",padding:"28px 24px 24px",width:"100%",maxWidth:340}}>
            <div style={{fontSize:12,letterSpacing:3,textTransform:"uppercase",color:"#F2F2F2",fontWeight:600,marginBottom:description?12:24}}>{title}</div>
            {description && (
              <div style={{fontSize:12,fontWeight:500,letterSpacing:"2.5px",color:"#666666",fontFamily:"'Aptos','Calibri','Segoe UI',system-ui,sans-serif",lineHeight:1.9,marginBottom:24,whiteSpace:"pre-line"}}>{description}</div>
            )}
            <div style={{display:"flex",gap:8}}>
              <button onClick={onBack} style={{flex:1,padding:"13px",borderRadius:8,background:"#161616",border:"1px solid #1E1E1E",color:"#888",cursor:"pointer",fontFamily:"inherit",fontSize:11,letterSpacing:2,textTransform:"uppercase"}}>Cancel</button>
              <button onClick={onConfirm} disabled={deleting} style={{flex:1,padding:"13px",borderRadius:8,...confirmStyle,cursor:deleting?"not-allowed":"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>{deleting?"Deleting...":confirmLabel}</button>
            </div>
          </div>
        </div>
      );
    }

    function UserMenu({ user, profile, onClose, onSignOut, onDeleteAccount, habits, setHabits, onClearAll, currentDateKey, data, setData, onManageHabits }) {
      const [subSheet, setSubSheet] = useState(null);
      const [deleting, setDeleting] = useState(false);

      const dt = new Date((currentDateKey||todayKey())+"T12:00:00");

      async function handleDelete() {
        setDeleting(true);
        try {
          localStorage.removeItem("last_email");
          localStorage.removeItem("last_name");
          if (_uid) {
            var db = window._db;
            var uid = _uid;
            var docs = ["habitData","habitList","profile"];
            for (var i = 0; i < docs.length; i++) {
              try { await db.collection("users").doc(uid).collection("data").doc(docs[i]).delete(); } catch(e2) {}
            }
            try { await db.collection("users").doc(uid).delete(); } catch(e2) {}
          }
          try {
            if (window._auth.currentUser) { await window._auth.currentUser.delete(); }
          } catch(e2) { await window._auth.signOut(); }
          try { await window._auth.signOut(); } catch(e2) {}
          if (onDeleteAccount) onDeleteAccount();
        } catch(e) {
          console.error(e);
          setDeleting(false);
          setSubSheet(null);
        }
      }

      function handleClearDay() {
        setData(prev=>{const n={...prev};delete n[currentDateKey||todayKey()];return n;});
        setSubSheet(null);
        onClose();
      }

      function handleClearAll() {
        onClearAll();
        setSubSheet(null);
        onClose();
      }

      const displayName = (profile && profile.name) || (user && user.displayName) || "User";
      const email = (user && user.email) || "";

      const menuBtn = (onClick, icon, label, color="#BBBBBB") => (
        <button onClick={onClick} style={{
          width:"100%",padding:"16px 28px",background:"none",border:"none",
          color,cursor:"pointer",fontFamily:"inherit",
          textAlign:"left",display:"flex",alignItems:"center",gap:14,
        }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">{icon}</svg>
          <span style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",fontWeight:500,color}}>{label}</span>
        </button>
      );

      const Sep = () => <div style={{height:1,background:"#1A1A1A",margin:"0 28px"}}/>;

      return (
        <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
          <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)"}}/>
          <div style={{position:"relative",background:"#101010",borderRadius:"20px 20px 0 0",
            border:"1px solid #1E1E1E",borderBottom:"none",paddingBottom:48,maxHeight:"92vh",overflowY:"auto"}}>

            <div style={{display:"flex",justifyContent:"center",padding:"14px 0 0"}}>
              <div style={{width:36,height:4,borderRadius:2,background:"#2A2A2A"}}/>
            </div>

            <div style={{padding:"20px 28px 20px",borderBottom:"1px solid #1A1A1A",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:11,letterSpacing:3,textTransform:"uppercase",color:"#F2F2F2",fontWeight:600}}>{displayName}</div>
                <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:"#666666",marginTop:6}}>{email}</div>
              </div>
              <button onClick={onClose} style={{background:"none",border:"none",color:"#3A3A3A",cursor:"pointer",padding:4,flexShrink:0}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>

            <div style={{padding:"8px 0 0"}}>
              {menuBtn(()=>{onClose();onManageHabits();},
                <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                "Manage Habits")}
              <Sep/>
              {menuBtn(()=>setSubSheet("clearDay"),
                <><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>,
                "Clear Day")}
              <Sep/>
              {menuBtn(()=>setSubSheet("clearAll"),
                <><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></>,
                "Clear All Data")}
              <Sep/>
              {menuBtn(()=>setSubSheet("logout"),
                <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
                "Logout")}
              <Sep/>
              {menuBtn(()=>setSubSheet("delete"),
                <><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></>,
                "Delete Account", "#CC4444")}
            </div>
          </div>

          {subSheet==="clearDay" && <ConfirmDialog
            title={`Clear ${dt.getDate()} ${MONTHS[dt.getMonth()].slice(0,3).toUpperCase()} ${dt.getFullYear()}`}
            description={`Are you sure you want to clear today's logged data?`}
            confirmLabel="Clear"
            confirmStyle={{background:T.text,border:`1px solid ${T.text}`,color:T.bg}}
            onConfirm={handleClearDay}
            onBack={()=>setSubSheet(null)}
          />}

          {subSheet==="clearAll" && <ConfirmDialog
            title="Clear All Tracked Data"
            description="Are you sure you want to clear all tracked data?"
            confirmLabel="Clear All"
            confirmStyle={{background:T.text,border:`1px solid ${T.text}`,color:T.bg}}
            onConfirm={handleClearAll}
            onBack={()=>setSubSheet(null)}
          />}

          {subSheet==="logout" && <ConfirmDialog
            title="Logout"
            description="Are you sure you want to logout?"
            confirmLabel="Logout"
            confirmStyle={{background:"#F2F2F2",border:"1px solid #F2F2F2",color:"#080808"}}
            onConfirm={onSignOut}
            onBack={()=>setSubSheet(null)}
          />}

          {subSheet==="delete" && <ConfirmDialog
            title="Delete Account"
            description="Are you sure you want to permanently delete your account?"
            confirmLabel="Delete"
            confirmStyle={{background:"#CC2222",border:"1px solid #CC2222",color:"#F2F2F2"}}
            onConfirm={handleDelete}
            onBack={()=>setSubSheet(null)}
            deleting={deleting}
          />}
        </div>
      );
    }

    // ── Root ─────────────────────────────────────────────────────
    function Root() {
      const [user,      setUser]      = useState(undefined);
      const [profile,   setProfile]   = useState(null);
      const [needsOnboard, setNeedsOnboard] = useState(false);
      const [tab,       setTab]       = useState("today");
      const [data,      setData]      = useState({});
      const [habits,    setHabits]    = useState(DEFAULT_HABITS);
      const [menuOpen,  setMenuOpen]  = useState(false);
      const [managingHabits, setManagingHabits] = useState(false);
      const [monthKey, setMonthKey] = useState(0);
      const [currentDateKey, setCurrentDateKey] = useState(todayKey());

      useEffect(() => {
        const unsub = window._auth.onAuthStateChanged(async function(u) {
          document.getElementById("loading").style.display = "none";
          setMenuOpen(false);
          if (u) {
            setUID(u.uid);
            localStorage.setItem("last_email", u.email || "");
            localStorage.setItem("last_name",  u.displayName || "");

            const [d, h, p] = await Promise.all([loadData(), loadHabits(), loadProfile()]);
            if (d && Object.keys(d).length) setData(d);
            if (h && h.length) setHabits(h);

            if (!p) {
              setUser(u);
              setNeedsOnboard(true);
            } else {
              setProfile(p);
              setUser(u);
              setNeedsOnboard(false);
            }
          } else {
            setUID(null);
            setUser(null);
            setNeedsOnboard(false);
          }
        });
        return function() { unsub(); };
      }, []);

      const handleSet = useCallback(function(updater) {
        setData(function(prev) {
          const next = typeof updater === "function" ? updater(prev) : updater;
          saveData(next);
          return next;
        });
      }, []);

      async function clearAll() {
        setData({});
        await saveData({});
      }

      function handleSignOut() {
        setMenuOpen(false);
        window._auth.signOut();
      }

      if (user === undefined) return null;
      if (!user) return <LoginScreen />;
      if (needsOnboard) return <OnboardingScreen user={user} onComplete={function(p){ setProfile(p); setNeedsOnboard(false); }}/>;

      return (
        <div style={{fontFamily:"'Aptos','Aptos Display','Calibri','Segoe UI',system-ui,sans-serif",background:"#080808",color:"#F2F2F2",minHeight:"100vh",maxWidth:430,margin:"0 auto",overflowX:"hidden"}}>
          {managingHabits
            ? <ManageHabitsPage habits={habits} setHabits={setHabits} onClose={()=>setManagingHabits(false)} onClearAll={clearAll}/>
            : <>
                {tab==="today" && <TodayScreen data={data} setData={handleSet} habits={habits} setHabits={setHabits} onClearAll={clearAll} user={user} onMenuOpen={()=>setMenuOpen(true)} currentDateKey={currentDateKey} setCurrentDateKey={setCurrentDateKey}/>}
                {tab==="month" && <MonthScreen key={monthKey} data={data} habits={habits}/>}
                {tab==="stats" && <StatsScreen data={data} habits={habits}/>}
                <Nav tab={tab} setTab={id=>{setTab(id);if(id==="today")setCurrentDateKey(todayKey());if(id==="month")setMonthKey(k=>k+1);}}/>
              </>
          }
          {menuOpen && <UserMenu user={user} profile={profile} onClose={()=>setMenuOpen(false)} onSignOut={handleSignOut} onDeleteAccount={()=>{ setUID(null); setUser(null); setMenuOpen(false); setData({}); setHabits(DEFAULT_HABITS); }} habits={habits} setHabits={setHabits} onClearAll={clearAll} currentDateKey={currentDateKey} data={data} setData={handleSet} onManageHabits={()=>setManagingHabits(true)}/>}
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: "" }; }
      static getDerivedStateFromError(e) { return { hasError: true, error: e.message }; }
      render() {
        if (this.state.hasError) return (
          <div style={{background:"#080808",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:32,fontFamily:"'Aptos',sans-serif"}}>
            <div style={{fontSize:10,letterSpacing:3,color:"#888",textTransform:"uppercase"}}>Something went wrong</div>
            <div style={{fontSize:11,color:"#3A3A3A",textAlign:"center"}}>{this.state.error}</div>
            <button onClick={()=>window.location.reload()} style={{padding:"10px 24px",background:"#F2F2F2",color:"#080808",border:"none",borderRadius:8,cursor:"pointer",fontSize:10,letterSpacing:2,textTransform:"uppercase",fontFamily:"inherit"}}>Reload</button>
          </div>
        );
        return this.props.children;
      }
    }

    ReactDOM.render(
      React.createElement(ErrorBoundary, null, React.createElement(Root)),
      document.getElementById("root")
    );
  </script>
</body>
</html>
